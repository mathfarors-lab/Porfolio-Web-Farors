<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="./bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css" />
    <link
      rel="stylesheet"
      href="./bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/font.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      :root {
        --primary-gold: #d4af37;
        --dark-stone: #1f2327;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background-color: var(--dark-stone);
        color: #333;
        background-size: cover;
        background-position: center;
      }
      main {
        width: 100%;
        height: 100vh;
        display: flex;
      }
      #hero-section {
        display: flex;
        flex-direction: row;
        align-items: center;
        width: 100%;
        height: 100% !important;
        justify-content: space-between;
        padding-left: 100px;
      }
      #profile {
        width: 50%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }
      #profile .img {
        width: 100%;
        height: 100vh;
        object-fit: cover;

        display: flex;
      }
      #profile .my-img {
        width: 90%;
        height: 60%;
        object-fit: cover;
        border-radius: 50%;
        margin-top: 20px;
        display: flex;
        margin-left: -150px;
        position: absolute;
        right: 57%;
        border: 2px solid var(--primary-gold);
        box-shadow: 0 4px 50px var(--primary-gold);
        perspective: 1000px;
      }
    </style>
  </head>
  <body>
    <header id="header">
      <h1 class="text m-0 text-shadow-gold">My Portfolio</h1>
      <nav id="navbar">
        <ul
          class="d-flex justify-content-center list-unstyled text m-0 list-style-none">
          <li>
            <a href="index.html" class="active">Home </a>
          </li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="about-me.html">About Me</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
      <a href="#contact"
        ><button class="btn btn-primary">Get in Touch</button></a
      >
    </header>
    <main id="main-content w-100% h-100%" class="mx-auto">
      <section class="d-flex">
        <div id="hero-section" class="text-center">
          <div class="main">
            <h2 class="text-white bold fw-bold display-3">
              I'm
              <span class="text fw-bolder display-3 text-shadow-gold"
                >MATH Farors</span
              >
            </h2>
            <p class="text-bold text-white">
              This is a brief introduction about myself and my work.
            </p>
            <p class="text-white">Full-Stack Developer | CUMT Student</p>
            <a href="#projects"
              ><button class="btn btn-primary text-white">
                View My Work
              </button></a
            >
          </div>
        </div>
        <div id="profile" class="text-center">
          <img class="my-img" src="./image/profile.png" alt="Profile Image" />
          <img
            class="img rounded-left-top "
            src="./image/background.png"
            alt="Background Image" />
        </div>
      </section>
    </main>

    <footer id="footer" class="text-center">
      <p class="text-white">&copy; 2026 Math Farors | Built in Phnom Penh</p>
    </footer>

    <script src="./bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
